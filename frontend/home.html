<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Chat - Messages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>📨 Cards Chat</h2>
        </div>

        <div class="user-profile">
            <div class="avatar" id="user-avatar">U</div>
            <div class="user-info">
                <h3 id="username-display">User</h3>
                <span id="user-status">● Online</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="search-area">
            <input type="text" id="search-users" placeholder="Search users..." oninput="handleSearch()">
            <div id="search-results" style="display: none; position: absolute; width: 280px; background: #222; border-radius: 8px; margin-top: 8px; max-height: 200px; overflow-y: auto; z-index: 100;"></div>
        </div>

        <div class="section-header">
            <span>Messages</span>
            <span id="friends-count" style="color: #e50914;">0</span>
        </div>
        <div class="friends-list" id="friends-list"></div>

        <div class="section-header">
            <span>Requests</span>
            <span id="requests-count" style="color: #e50914;">0</span>
        </div>
        <div class="requests-list" id="requests-list"></div>

        <div class="section-header">
            <span>Sent</span>
            <span id="sent-count" style="color: #e50914;">0</span>
        </div>
        <div class="sent-requests-list" id="sent-list"></div>
    </aside>

    <main class="chat-area" id="chat-area">
        <div class="empty-state" id="empty-chat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <h3>Welcome to Cards Chat</h3>
            <p>Search for users above to start a conversation.<br>Your messages are end-to-end encrypted.</p>
        </div>

        <div class="chat-container" id="chat-container" style="display: none;">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="friend-avatar" id="chat-avatar">U</div>
                    <div>
                        <h2 id="chat-username">User</h2>
                        <p id="chat-status">Online</p>
                    </div>
                </div>
                <button class="btn-decline" onclick="closeChat()" style="padding: 8px 16px;">Close</button>
            </div>
            <div class="messages-container" id="messages-container"></div>
            <div class="input-area">
                <form onsubmit="sendMessage(event)">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" id="send-btn">Send</button>
                </form>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="app.js"></script>

</body>
</html>
